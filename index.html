<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link type="icon" sizes="32x32" href="images/favicon-32x32.png" />
    <title>Frontend Mentor | Result Summary</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="result-container">
        <div class="result-1"><p>Your Result</p></div>
        <div class="result-2">
          <h1>76</h1>
          <p>of 100</p>
        </div>
        <div class="result-3"><h1>Great</h1></div>
        <div class="result-4">
          <p>
            You scored higher than 65% of the people who have taken these tests.
          </p>
        </div>
      </div>
      <div class="summary-container">
        <div class="summary-1">
          <p>Summary</p>
        </div>
        <div class="summary-2">
          <div class="reaction">
            <div class="reaction-1">
              <img src="images/icon-reaction.svg" />
              <p>Reaction</p>
            </div>
            <div class="reaction-2">
              <p>80 <span>/ 100</span></p>
            </div>
          </div>
          <div class="memory">
            <div class="memory-1">
              <img src="images/icon-memory.svg" />
              <p>Memory</p>
            </div>
            <div class="memory-2">
              <p>92 <span>/ 100</span></p>
            </div>
          </div>
          <div class="verbal">
            <div class="verbal-1">
              <img src="images/icon-verbal.svg" />
              <p>Verbal</p>
            </div>
            <div class="verbal-2">
              <p>61 <span>/ 100</span></p>
            </div>
          </div>
          <div class="visual">
            <div class="visual-1">
              <img src="images/icon-visual.svg" />
              <p>Visual</p>
            </div>
            <div class="visual-2">
              <p>73 <span>/ 100</span></p>
            </div>
          </div>
        </div>
        <div class="summary-3">
          <button class="continue-btn">Continue</button>
        </div>
      </div>
    </div>
  </body>
</html>
